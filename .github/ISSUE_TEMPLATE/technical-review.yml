name: Independent technical review
description: Record a focused or detailed review without implying endorsement or production validation.
title: "Technical review: v1.3.1"
labels: ["technical-review"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reviewing CCAF. These prompts structure an authentic review; brief responses are welcome, and not every optional prompt must be answered. Please write professional opinions in your own words.
  - type: input
    id: version
    attributes:
      label: Version or commit reviewed
      value: v1.3.1
      description: Identify the exact tag or full commit SHA examined.
    validations:
      required: true
  - type: dropdown
    id: depth
    attributes:
      label: Review depth
      options:
        - Focused review
        - Detailed review
        - Other
    validations:
      required: true
  - type: textarea
    id: reviewer
    attributes:
      label: Reviewer background
      description: Briefly describe relevant audit, cybersecurity, risk, analytics, or financial-services experience and any prior relationship with the author.
    validations:
      required: true
  - type: checkboxes
    id: procedures
    attributes:
      label: Procedures performed
      description: Select only procedures personally performed.
      options:
        - label: I reproduced the documented synthetic demonstration.
        - label: I reviewed the methodology and stated limitations.
        - label: I ran the automated test suite.
        - label: I inspected selected control logic or output artifacts.
  - type: textarea
    id: soundness
    attributes:
      label: Overall professional opinion
      description: In your own words, comment on technical soundness and consistency with professional control-testing practice.
    validations:
      required: true
  - type: textarea
    id: boundaries
    attributes:
      label: Claims and limitations
      description: Optional. Comment on whether the claims are appropriately bounded to what the demonstration establishes.
  - type: textarea
    id: observations
    attributes:
      label: Observations or improvements
      description: Optional. Identify strengths, limitations, errors, or suggested improvements.
  - type: checkboxes
    id: acknowledgement
    attributes:
      label: Acknowledgement
      options:
        - label: This review reflects my own judgment and does not claim institutional adoption, regulatory approval, certification, or production performance.
          required: true
