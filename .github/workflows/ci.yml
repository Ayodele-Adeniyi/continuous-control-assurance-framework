name: CCAF verification

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Install documentation dependency
        if: matrix.python-version == '3.12'
        run: python -m pip install -r requirements-docs.txt

      - name: Run regression tests
        run: python -m unittest discover -s tests -v

      - name: Run synthetic smoke test
        run: python run_all.py --regenerate --no-charts --output-dir .ci-output

      - name: Regenerate publication artifacts
        if: matrix.python-version == '3.12'
        run: |
          python run_all.py --regenerate
          python scripts/build_methodology_pdf.py
          python -c "from pathlib import Path; p=Path('docs/CCAF_Framework_Methodology.pdf'); assert p.exists() and p.stat().st_size > 100000"
